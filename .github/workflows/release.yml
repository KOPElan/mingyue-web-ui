name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: '发布版本号（如 v1.0.0）'
        required: true
        type: string

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  FRONTEND_IMAGE: ghcr.io/${{ github.repository }}/frontend
  PROXY_IMAGE: ghcr.io/${{ github.repository }}/backend-proxy

jobs:
  # ── 1. 构建前端静态资源 ────────────────────────────────────────────
  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: frontend
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: 获取版本号
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: 安装依赖
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: 单元测试
        run: npm run test:unit

      - name: 生产构建
        run: npm run build

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 1

  # ── 2. 构建 Docker 镜像 ───────────────────────────────────────────
  build-docker:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: build-frontend
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: 下载前端构建产物
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/

      - name: 登录 GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 设置 Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 提取版本元数据（frontend）
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.FRONTEND_IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ needs.build-frontend.outputs.version }},enable=${{ github.event_name == 'workflow_dispatch' }}

      - name: 提取版本元数据（backend-proxy）
        id: meta-proxy
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.PROXY_IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ needs.build-frontend.outputs.version }},enable=${{ github.event_name == 'workflow_dispatch' }}

      - name: 构建并推送 frontend 镜像
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: 构建并推送 backend-proxy 镜像
        uses: docker/build-push-action@v6
        with:
          context: ./backend-proxy
          file: ./backend-proxy/Dockerfile
          push: true
          tags: ${{ steps.meta-proxy.outputs.tags }}
          labels: ${{ steps.meta-proxy.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── 3. 打包发布到 GitHub Releases ────────────────────────────────
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-frontend, build-docker]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: 下载前端构建产物
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend-dist/

      - name: 打包前端静态资源
        run: |
          VERSION=${{ needs.build-frontend.outputs.version }}
          tar -czf "mingyue-web-ui-frontend-${VERSION}.tar.gz" -C frontend-dist .
          zip -r "mingyue-web-ui-frontend-${VERSION}.zip" frontend-dist/

      - name: 生成 docker-compose 发布包
        run: |
          VERSION=${{ needs.build-frontend.outputs.version }}
          cat > docker-compose.release.yml << EOF
          services:
            backend-proxy:
              image: ${{ env.PROXY_IMAGE }}:${VERSION}
              container_name: mingyue-proxy
              restart: unless-stopped
              env_file:
                - backend-proxy.env
              ports:
                - "3000:3000"
              healthcheck:
                test: ["CMD", "node", "-e", "fetch('http://localhost:3000/health').then(r=>process.exit(r.ok?0:1))"]
                interval: 30s
                timeout: 5s
                retries: 3
                start_period: 10s

            frontend:
              image: ${{ env.FRONTEND_IMAGE }}:${VERSION}
              container_name: mingyue-frontend
              restart: unless-stopped
              ports:
                - "5173:80"
              depends_on:
                backend-proxy:
                  condition: service_healthy
          EOF

      - name: 创建 GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.build-frontend.outputs.version }}
          name: "mingyue-web-ui ${{ needs.build-frontend.outputs.version }}"
          body: |
            ## 🚀 mingyue-web-ui ${{ needs.build-frontend.outputs.version }}

            ### Docker 快速部署

            ```bash
            # 下载发布的 docker-compose 配置
            curl -L https://github.com/${{ github.repository }}/releases/download/${{ needs.build-frontend.outputs.version }}/docker-compose.release.yml -o docker-compose.yml

            # 配置环境变量
            cat > backend-proxy.env << 'EOF'
            JWT_SECRET=<请替换为随机强密钥>
            ADMIN_PASSWORD=<请替换为强密码>
            EOF

            # 启动
            docker compose up -d
            ```

            ### 手动部署

            下载 `mingyue-web-ui-frontend-*.tar.gz` 或 `.zip`，解压后通过 nginx/caddy 等 Web 服务器托管。

            详细部署文档：[docs/deployment.md](https://github.com/${{ github.repository }}/blob/main/docs/deployment.md)

            ### Docker 镜像

            ```
            frontend:      ${{ env.FRONTEND_IMAGE }}:${{ needs.build-frontend.outputs.version }}
            backend-proxy: ${{ env.PROXY_IMAGE }}:${{ needs.build-frontend.outputs.version }}
            ```
          files: |
            mingyue-web-ui-frontend-${{ needs.build-frontend.outputs.version }}.tar.gz
            mingyue-web-ui-frontend-${{ needs.build-frontend.outputs.version }}.zip
            docker-compose.release.yml
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(needs.build-frontend.outputs.version, '-') }}
