name: CI

on:
  push:
    branches: [main, master, 001-web-frontend]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  backend-proxy:
    name: Backend Proxy Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: backend-proxy
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend-proxy/package-lock.json
      - name: Install dependencies
        run: npm install
      - name: Start proxy server (smoke test)
        run: |
          timeout 10 node src/index.js &
          sleep 3
          curl -sf http://localhost:3000/health || exit 1
          kill %1 || true

  frontend:
    name: Frontend Build & Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm run test:unit

      - name: Type check & Build
        run: npm run build

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    needs: [frontend, backend-proxy]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install backend dependencies
        working-directory: backend-proxy
        run: npm install

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Start backend proxy
        working-directory: backend-proxy
        # Raise auth rate limit so all E2E login calls stay within the window.
        # Default (20/15 min) is too low for CI with multiple test retries.
        run: node src/index.js &
        env:
          RATE_LIMIT_AUTH_MAX: '200'

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Start frontend preview
        working-directory: frontend
        run: npm run preview &

      - name: Wait for services
        run: |
          for i in $(seq 1 15); do
            curl -sf http://localhost:3000/health && break
            sleep 1
          done
          for i in $(seq 1 15); do
            curl -sf http://localhost:4173 && break
            sleep 1
          done

      - name: Run E2E tests
        working-directory: frontend
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:4173
        run: npm run test:e2e

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7
