services:
  backend-proxy:
    build:
      context: ./backend-proxy
      dockerfile: Dockerfile
    container_name: mingyue-proxy
    restart: unless-stopped
    env_file:
      - backend-proxy/.env
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/health').then(r=>process.exit(r.ok?0:1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: mingyue-frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      backend-proxy:
        condition: service_healthy
